services:
  - type: web
    name: lexai-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
